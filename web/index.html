<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spiral — shell mesh generator</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e1116;
        color: #d8dee9;
        height: 100vh;
        display: grid;
        grid-template-columns: 300px 1fr;
      }
      aside {
        padding: 20px;
        border-right: 1px solid #20262e;
        overflow-y: auto;
      }
      h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: .02em; }
      p.sub { margin: 0 0 20px; color: #8b97a8; font-size: 12px; }
      label { display: block; margin: 16px 0 4px; font-size: 12px; color: #aeb9c9; }
      .row { display: flex; align-items: center; gap: 10px; }
      input[type="range"] { flex: 1; accent-color: #c8a35a; }
      output { width: 44px; text-align: right; font-variant-numeric: tabular-nums; color: #e7d8b6; }
      select {
        width: 100%; padding: 7px 8px; margin-bottom: 8px;
        background: #161b22; color: #d8dee9; border: 1px solid #2a313b; border-radius: 6px;
      }
      shell-viewer { width: 100%; height: 100%; }
      .section { margin: 22px 0 2px; font-size: 11px; text-transform: uppercase;
        letter-spacing: .08em; color: #c8a35a; border-top: 1px solid #20262e; padding-top: 14px; }
      .dice { margin-top: 10px; width: 100%; padding: 8px; cursor: pointer;
        background: #161b22; color: #d8dee9; border: 1px solid #2a313b; border-radius: 6px; }
      .dice:hover { border-color: #c8a35a; color: #e7d8b6; }
      .swatch { flex: 1; height: 26px; padding: 0; cursor: pointer;
        background: #161b22; border: 1px solid #2a313b; border-radius: 6px; }
      .rstatus { margin-top: 8px; font-size: 11px; color: #8b97a8; min-height: 14px; }
      footer { margin-top: 22px; font-size: 11px; color: #6b7686; }
      code { color: #c8a35a; }
    </style>
  </head>
  <body>
    <aside>
      <h1>Spiral</h1>
      <p class="sub">Logarithmic helico-spiral shell generator (Rust → WASM).</p>

      <label for="preset">Preset</label>
      <select id="preset"></select>

      <form id="controls">
        <label>Whorl expansion <code>W</code><div class="row">
          <input name="w" type="range" min="1.05" max="6" step="0.01" value="2.0" />
          <output id="val-w">2.0</output></div></label>

        <label>Openness <code>D</code><div class="row">
          <input name="d" type="range" min="0" max="0.9" step="0.01" value="0.15" />
          <output id="val-d">0.15</output></div></label>

        <label>Translation <code>T</code><div class="row">
          <input name="t" type="range" min="0" max="12" step="0.01" value="1.5" />
          <output id="val-t">1.5</output></div></label>

        <label>Whorls <code>n</code><div class="row">
          <input name="n" type="range" min="0.5" max="14" step="0.1" value="5" />
          <output id="val-n">5.0</output></div></label>

        <label>Aperture aspect<div class="row">
          <input name="aspect" type="range" min="0.3" max="3" step="0.01" value="1.0" />
          <output id="val-aspect">1.0</output></div></label>

        <div class="section">Ornamentation</div>

        <label>Axial ribs / waves<div class="row">
          <input name="rib_ax_count" type="range" min="0" max="40" step="1" value="0" />
          <output id="val-rib_ax_count">0</output></div></label>

        <label>Axial amplitude<div class="row">
          <input name="rib_ax_amp" type="range" min="0" max="0.6" step="0.01" value="0" />
          <output id="val-rib_ax_amp">0.00</output></div></label>

        <label>Spiral cords<div class="row">
          <input name="rib_sp_count" type="range" min="0" max="30" step="1" value="0" />
          <output id="val-rib_sp_count">0</output></div></label>

        <label>Spiral amplitude<div class="row">
          <input name="rib_sp_amp" type="range" min="0" max="0.6" step="0.01" value="0" />
          <output id="val-rib_sp_amp">0.00</output></div></label>

        <label>Profile (wave → ridge)<div class="row">
          <input name="rib_sharp" type="range" min="0" max="1" step="0.01" value="0" />
          <output id="val-rib_sharp">0.00</output></div></label>

        <div class="section">Projections (nodules → spines)</div>

        <label>Projections / whorl<div class="row">
          <input name="proj_count" type="range" min="0" max="20" step="1" value="0" />
          <output id="val-proj_count">0</output></div></label>

        <label>Rows around aperture<div class="row">
          <input name="proj_rows" type="range" min="0" max="5" step="1" value="0" />
          <output id="val-proj_rows">0</output></div></label>

        <label>Row position (φ)<div class="row">
          <input name="proj_pos" type="range" min="0" max="6.28" step="0.01" value="0" />
          <output id="val-proj_pos">0.00</output></div></label>

        <label>Size<div class="row">
          <input name="proj_size" type="range" min="0" max="1.2" step="0.01" value="0" />
          <output id="val-proj_size">0.00</output></div></label>

        <label>Sharpness (bead → needle)<div class="row">
          <input name="proj_sharp" type="range" min="0" max="1" step="0.01" value="0" />
          <output id="val-proj_sharp">0.00</output></div></label>

        <div class="section">Varices</div>

        <label>Varices / whorl<div class="row">
          <input name="varix_count" type="range" min="0" max="6" step="1" value="0" />
          <output id="val-varix_count">0</output></div></label>

        <label>Varix prominence<div class="row">
          <input name="varix_amp" type="range" min="0" max="0.5" step="0.01" value="0" />
          <output id="val-varix_amp">0.00</output></div></label>

        <div class="section">Randomness</div>

        <label>Jitter<div class="row">
          <input name="jitter" type="range" min="0" max="1" step="0.01" value="0" />
          <output id="val-jitter">0.00</output></div></label>

        <label>Seed<div class="row">
          <input name="seed" type="range" min="0" max="9999" step="1" value="0" />
          <output id="val-seed">0</output></div></label>

        <button type="button" id="dice" class="dice">🎲 Random seed</button>

        <div class="section">Material</div>

        <label>Base colour<div class="row">
          <input name="matcolor" type="color" value="#e7d8b6" class="swatch" />
        </div></label>

        <label>Roughness<div class="row">
          <input name="roughness" type="range" min="0" max="1" step="0.01" value="0.3" />
          <output id="val-roughness">0.30</output></div></label>

        <label>Clearcoat<div class="row">
          <input name="clearcoat" type="range" min="0" max="1" step="0.01" value="0.55" />
          <output id="val-clearcoat">0.55</output></div></label>

        <label>Translucency<div class="row">
          <input name="transmission" type="range" min="0" max="1" step="0.01" value="0" />
          <output id="val-transmission">0.00</output></div></label>

        <label>Iridescence<div class="row">
          <input name="iridescence" type="range" min="0" max="1" step="0.01" value="0" />
          <output id="val-iridescence">0.00</output></div></label>
      </form>

      <div class="section">Render</div>
      <button type="button" id="render" class="dice">▶ Render (path trace)</button>
      <button type="button" id="savepng" class="dice">⬇ Save PNG</button>
      <div id="rstatus" class="rstatus"></div>

      <footer>Drag to orbit · scroll to zoom.</footer>
    </aside>

    <shell-viewer id="viewer"></shell-viewer>

    <script type="module">
      import "./shell-viewer.js";

      const viewer = document.getElementById("viewer");
      const form = document.getElementById("controls");
      const FIELDS = [
        "w", "d", "t", "n", "aspect",
        "rib_ax_count", "rib_ax_amp", "rib_sp_count", "rib_sp_amp", "rib_sharp",
        "proj_count", "proj_rows", "proj_pos", "proj_size", "proj_sharp",
        "varix_count", "varix_amp",
        "seed", "jitter",
      ];
      const INTS = new Set([
        "rib_ax_count", "rib_sp_count", "proj_count", "proj_rows", "varix_count", "seed",
      ]);

      const readForm = () =>
        Object.fromEntries(FIELDS.map((f) => [f, parseFloat(form.elements[f].value)]));

      let timer;
      function update() {
        for (const f of FIELDS) {
          const out = document.getElementById("val-" + f);
          if (out) {
            const v = parseFloat(form.elements[f].value);
            out.textContent = INTS.has(f) ? String(v) : v.toFixed(2);
          }
        }
        clearTimeout(timer);
        timer = setTimeout(() => viewer.setParams(readForm()), 30);
      }

      // Material controls update the look without regenerating geometry.
      const MAT_RANGES = ["roughness", "clearcoat", "transmission", "iridescence"];
      const MAT_SET = new Set([...MAT_RANGES, "matcolor"]);
      function updateMaterial() {
        for (const f of MAT_RANGES) {
          const out = document.getElementById("val-" + f);
          if (out) out.textContent = parseFloat(form.elements[f].value).toFixed(2);
        }
        viewer.setMaterial({
          ...Object.fromEntries(MAT_RANGES.map((f) => [f, parseFloat(form.elements[f].value)])),
          color: parseInt(form.elements["matcolor"].value.slice(1), 16),
        });
      }

      form.addEventListener("input", (e) => {
        if (MAT_SET.has(e.target.name)) updateMaterial();
        else update();
      });

      const PRESETS = {
        "Snail (default)":        { w: 2.0, d: 0.15, t: 1.5,  n: 5,  aspect: 1.0 },
        "Nautilus (planispiral)": { w: 3.0, d: 0.10, t: 0.0,  n: 4,  aspect: 1.0 },
        "Auger (high spire)":     { w: 1.5, d: 0.00, t: 10.0, n: 9,  aspect: 0.5 },
        "Globe snail":            { w: 2.6, d: 0.20, t: 0.8,  n: 4,  aspect: 1.2 },
        "Open coil (sundial)":    { w: 1.6, d: 0.60, t: 0.3,  n: 6,  aspect: 1.0 },
        "Cancellaria (cancellate)": {
          w: 1.9, d: 0.12, t: 2.0, n: 6, aspect: 0.85,
          rib_ax_count: 14, rib_ax_amp: 0.07, rib_sp_count: 11, rib_sp_amp: 0.05, rib_sharp: 0.35,
        },
        "Wavy planispiral": {
          w: 2.6, d: 0.12, t: 0.0, n: 4, aspect: 1.0,
          rib_ax_count: 9, rib_ax_amp: 0.16, rib_sharp: 0.0,
        },
        "Ribbed spire": {
          w: 1.7, d: 0.06, t: 4.0, n: 8, aspect: 0.6,
          rib_ax_count: 15, rib_ax_amp: 0.08, rib_sharp: 0.6,
        },
        "Murex (spines)": {
          w: 1.9, d: 0.10, t: 1.8, n: 6, aspect: 0.8,
          proj_count: 8, proj_rows: 1, proj_pos: 1.1, proj_size: 0.7, proj_sharp: 0.75,
        },
        "Tuberculate (nodules)": {
          w: 1.8, d: 0.10, t: 2.2, n: 6, aspect: 0.85,
          proj_count: 12, proj_rows: 2, proj_pos: 0.6, proj_size: 0.12, proj_sharp: 0.15,
        },
        "Varices (frog shell)": {
          w: 2.0, d: 0.12, t: 1.6, n: 6, aspect: 0.85,
          varix_count: 3, varix_amp: 0.28,
        },
      };
      const preset = document.getElementById("preset");
      for (const name of Object.keys(PRESETS)) {
        preset.append(new Option(name, name));
      }
      preset.addEventListener("change", () => {
        const p = PRESETS[preset.value];
        if (!p) return;
        for (const f of FIELDS) form.elements[f].value = p[f] ?? 0; // unset ornament → 0
        update();
      });

      document.getElementById("dice").addEventListener("click", () => {
        form.elements["seed"].value = Math.floor(Math.random() * 10000);
        update();
      });

      // Path-traced "Render" mode.
      const renderBtn = document.getElementById("render");
      const rstatus = document.getElementById("rstatus");
      let rendering = false;
      renderBtn.addEventListener("click", async () => {
        if (rendering) {
          viewer.stopHQ();
          rendering = false;
          renderBtn.textContent = "▶ Render (path trace)";
          rstatus.textContent = "";
          return;
        }
        rstatus.textContent = "starting path tracer…";
        const ok = await viewer.renderHQ();
        if (!ok) { rstatus.textContent = "path tracer unavailable (see console)"; return; }
        rendering = true;
        renderBtn.textContent = "■ Stop";
      });
      viewer.addEventListener("hq-progress", (e) => {
        if (rendering) rstatus.textContent = `path-tracing… ${e.detail.samples} samples (drag to re-aim)`;
      });
      document.getElementById("savepng").addEventListener("click", () => viewer.saveImage("shell.png"));

      update(); // push initial geometry values
      updateMaterial(); // push initial material values
    </script>
  </body>
</html>
