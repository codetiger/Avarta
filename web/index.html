<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spiral — shell mesh generator</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e1116;
        color: #d8dee9;
        height: 100vh;
        display: grid;
        grid-template-columns: 300px 1fr 250px;
        grid-template-rows: auto 1fr; /* title bar, then the three columns */
      }
      /* Full-width title bar across the top of all three columns. Holds the app
         name + tagline so they stay put while the panels below scroll. */
      header.titlebar {
        grid-column: 1 / -1;
        display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
        padding: 12px 20px;
        border-bottom: 1px solid #20262e;
      }
      header.titlebar h1 { margin: 0; }
      header.titlebar .sub { margin: 0; }
      /* Both side columns stack two scrollable panes (top/bottom half). */
      aside {
        border-right: 1px solid #20262e;
        overflow: hidden; display: flex; flex-direction: column;
      }
      /* Left column: shape controls (top) + pigmentation (bottom). */
      aside.left .pane { padding: 0 20px 16px; overflow-y: auto; }
      .shape-pane { flex: 1 1 58%; }
      .pigment-pane { flex: 1 1 42%; border-top: 1px solid #20262e; }
      /* Right column: species browser (top) + appearance controls (bottom). */
      aside.right {
        border-right: none; border-left: 1px solid #20262e;
      }
      aside.right .pane { padding: 0 12px 14px; overflow-y: auto; }
      .species-pane { flex: 1 1 54%; }
      .appearance-pane { flex: 1 1 46%; border-top: 1px solid #20262e; }
      /* Sticky pane title: pins to the top of its own scroll area (opaque bg so the
         content slides underneath). Top padding lives on the heading so it sits flush. */
      aside h2 {
        font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
        color: #c8a35a; margin: 0 0 12px;
        position: sticky; top: 0; z-index: 1;
        padding: 14px 0 8px; background: #0e1116;
      }
      ul.species-list { list-style: none; margin: 0; padding: 0;
        display: flex; flex-direction: column; gap: 6px; }
      .species-item {
        display: flex; align-items: center; gap: 10px; padding: 6px;
        border: 1px solid transparent; border-radius: 8px; cursor: pointer;
      }
      .species-item:hover { background: #141a21; border-color: #232b35; }
      .species-item.active { background: #1a212b; border-color: #c8a35a; }
      .species-thumb {
        width: 50px; height: 50px; flex: none; border-radius: 6px;
        background: #10151c; object-fit: contain;
      }
      .species-name { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
      .species-sci { font-style: italic; color: #e7d8b6; font-size: 12.5px; }
      .species-common { color: #8b97a8; font-size: 11px; }

      /* Appearance controls. */
      .field-label { font-size: 12px; color: #aeb9c9; margin: 14px 0 6px; }
      .field-label.first { margin-top: 0; }
      .mode-group { display: flex; gap: 6px; }
      .mode-btn {
        flex: 1; height: 38px; display: flex; align-items: center; justify-content: center;
        background: #161b22; color: #8b97a8; border: 1px solid #2a313b;
        border-radius: 6px; cursor: pointer;
      }
      .mode-btn:hover { color: #d8dee9; border-color: #3a434f; }
      .mode-btn.active { color: #e7d8b6; border-color: #c8a35a; background: #1a212b; }
      .mode-btn svg { display: block; }
      /* Layer-4 pigment palette: three labelled colour wells. */
      .palette { display: flex; gap: 8px; margin-top: 4px; }
      .palette label { flex: 1; display: flex; flex-direction: column; gap: 4px;
        margin: 0; font-size: 11px; color: #8b97a8; text-align: center; }
      .palette input[type="color"] { width: 100%; height: 26px; padding: 0; cursor: pointer;
        background: none; border: 1px solid #2a313b; border-radius: 6px; }
      .palette input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
      .palette input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
      h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: .02em; }
      p.sub { margin: 0 0 20px; color: #8b97a8; font-size: 12px; }
      label { display: block; margin: 14px 0 4px; font-size: 12px; color: #aeb9c9; }
      .row { display: flex; align-items: center; gap: 10px; }
      input[type="range"] { flex: 1; accent-color: #c8a35a; }
      output { width: 44px; text-align: right; font-variant-numeric: tabular-nums; color: #e7d8b6; }
      select {
        width: 100%; padding: 7px 8px; margin-bottom: 8px;
        background: #161b22; color: #d8dee9; border: 1px solid #2a313b; border-radius: 6px;
      }
      shell-viewer { width: 100%; height: 100%; }

      /* Collapsible parameter groups (native <details>, styled like the old
         section headers with a disclosure triangle). */
      /* Each group is a boxed card on a slightly raised background, so its
         controls clearly read as belonging to the group. */
      details {
        background: #141a21;
        border: 1px solid #232b35;
        border-radius: 8px;
        margin: 0 0 10px;
        padding: 0 12px;
      }
      summary {
        list-style: none; cursor: pointer; padding: 12px 0;
        font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
        color: #c8a35a; display: flex; align-items: center; gap: 7px; user-select: none;
      }
      details[open] { padding-bottom: 12px; }
      details[open] > summary { padding-bottom: 6px; }
      summary::-webkit-details-marker { display: none; }
      summary::before { content: "▸"; font-size: 9px; transition: transform .15s ease; }
      details[open] > summary::before { transform: rotate(90deg); }
      summary + label { margin-top: 8px; }
      /* Nested subgroups (inside Ornamentation): a recessed inner card. */
      details.sub {
        background: #10151c;
        border: 1px solid #1c232c;
        border-radius: 6px;
        margin: 10px 0 0;
        padding: 0 10px;
      }
      details.sub[open] { padding-bottom: 10px; }
      details.sub > summary { padding: 9px 0; font-size: 11px;
        text-transform: none; letter-spacing: .02em; color: #9aa7b8; }
      details.sub[open] > summary { padding-bottom: 2px; }
      .subhead { margin: 14px 0 0; font-size: 11px; color: #8b97a8; letter-spacing: .03em; }
      .hint { color: #6b7686; cursor: help; font-size: 11px; }

      .dice { margin-top: 10px; width: 100%; padding: 8px; cursor: pointer;
        background: #161b22; color: #d8dee9; border: 1px solid #2a313b; border-radius: 6px; }
      .dice:hover { border-color: #c8a35a; color: #e7d8b6; }
      .rstatus { margin-top: 8px; font-size: 11px; color: #8b97a8; min-height: 14px; }
      footer { margin-top: 22px; font-size: 11px; color: #6b7686; }
      code { color: #c8a35a; }
    </style>
  </head>
  <body>
    <header class="titlebar">
      <h1>Spiral</h1>
      <p class="sub">Logarithmic helico-spiral shell generator (Rust → WASM).</p>
    </header>

    <aside class="left">
      <!-- Top half: shape controls, generated in buildControls() from the Rust
           param_ranges() table. Bottom half: pigmentation, built in
           buildPigmentation() from pigment_ranges(). -->
      <section class="pane shape-pane">
        <h2>Shape</h2>
        <form id="controls"></form>
        <footer>Drag to orbit · scroll to zoom.</footer>
      </section>
      <section class="pane pigment-pane">
        <h2>Pigmentation</h2>
        <div id="pigmentation"></div>
      </section>
    </aside>

    <shell-viewer id="viewer"></shell-viewer>

    <aside class="right">
      <section class="pane species-pane">
        <h2>Species</h2>
        <ul id="species-list" class="species-list"></ul>
      </section>
      <section class="pane appearance-pane">
        <h2>Appearance</h2>
        <div id="appearance"></div>
      </section>
    </aside>

    <script type="module">
      import "./shell-viewer.js";

      const viewer = document.getElementById("viewer");
      const form = document.getElementById("controls");
      const appearance = document.getElementById("appearance");
      const pigmentation = document.getElementById("pigmentation");

      // ---- Friendly labels -------------------------------------------------
      // Plain-language label + a hover hint that keeps the scientific term
      // (Raup W/D/T, φ, …) discoverable. Maps shape-param key → copy. The slider
      // min/max/step/default still come from the Rust param_ranges() table.
      const LABELS = {
        w:      { label: "Whorl growth",    hint: "Raup W — how fast each turn widens (slender ↔ fat)" },
        d:      { label: "Coil openness",   hint: "Raup D — distance from the coiling axis (tight ↔ open)" },
        t:      { label: "Spire height",    hint: "Raup T — axial rise per turn (flat ↔ tall)" },
        n:      { label: "Number of turns", hint: "n — total whorls / revolutions" },
        aspect: { label: "Opening shape",   hint: "Aperture aspect — cross-section (tall ↔ round ↔ wide)" },
        rib_ax_count: { label: "Ribs per turn",  hint: "Axial ribs / waves crossing each whorl" },
        rib_ax_amp:   { label: "Rib height",     hint: "Axial rib amplitude (fraction of tube radius)" },
        rib_sp_count: { label: "Spiral cords",   hint: "Cords running along the coil" },
        rib_sp_amp:   { label: "Cord height",    hint: "Spiral cord amplitude" },
        rib_sharp:    { label: "Rib profile",    hint: "Rounded wave ↔ sharp ridge" },
        proj_count:   { label: "Bumps per turn", hint: "Projections per whorl" },
        proj_rows:    { label: "Rows of bumps",  hint: "1 = single row (spine-like), ≥2 = nodular rows" },
        proj_pos:     { label: "Bump placement", hint: "Row position φ (0–2π around the opening)" },
        proj_size:    { label: "Bump size",      hint: "Projection length (fraction of tube radius)" },
        proj_sharp:   { label: "Bump shape",     hint: "Rounded bead ↔ sharp spine" },
        varix_count:  { label: "Flared ridges per turn", hint: "Varices — growth-pause ridges (Murex / frog shells)" },
        varix_amp:    { label: "Ridge prominence",       hint: "Varix amplitude" },
        jitter:       { label: "Irregularity",   hint: "Random variation amount (uniform ↔ chaotic)" },
        seed:         { label: "Variation seed", hint: "Same seed + params → identical shell" },
      };

      // ---- Grouping --------------------------------------------------------
      // Top-level collapsible groups for the shape parameters. The "Appearance"
      // group (render mode + material) is built separately below.
      const GROUPS = [
        { id: "shape", title: "Shape", open: true, params: ["w", "d", "t", "n", "aspect"] },
        {
          id: "orn", title: "Ornamentation", open: false,
          subgroups: [
            { title: "Ribs & cords",   params: ["rib_ax_count", "rib_ax_amp", "rib_sp_count", "rib_sp_amp", "rib_sharp"] },
            { title: "Bumps & spines", params: ["proj_count", "proj_rows", "proj_pos", "proj_size", "proj_sharp"] },
            { title: "Flared ridges",  params: ["varix_count", "varix_amp"] },
            { title: "Randomness",     params: ["jitter", "seed"], dice: true },
          ],
        },
      ];

      // Appearance controls are viewer-side (not Rust shape params), so their
      // ranges/defaults live here. Updating these reskins without regenerating.
      const MATERIAL = [
        { key: "roughness",    label: "Roughness",    hint: "Matte ↔ glossy",                 min: 0, max: 1, step: 0.01, value: 0.3 },
        { key: "clearcoat",    label: "Gloss coat",   hint: "Clear glossy top layer (live view only)", min: 0, max: 1, step: 0.01, value: 0.55 },
        { key: "transmission", label: "Translucency", hint: "Glass-like transparency",         min: 0, max: 1, step: 0.01, value: 0 },
        { key: "iridescence",  label: "Iridescence",  hint: "Thin-film colour shift (nacre / pearl)", min: 0, max: 1, step: 0.01, value: 0 },
      ];
      const MAT_RANGES = MATERIAL.map((m) => m.key);

      // Display modes as small icon buttons (filled sphere / wire globe / both).
      const ICON = {
        solid: `<svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="8" fill="currentColor"/></svg>`,
        wireframe: `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="8"/><ellipse cx="12" cy="12" rx="8" ry="3.2"/><ellipse cx="12" cy="12" rx="3.2" ry="8"/></svg>`,
        "solid+wireframe": `<svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.4"/><g fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="8"/><ellipse cx="12" cy="12" rx="8" ry="3.2"/><ellipse cx="12" cy="12" rx="3.2" ry="8"/></g></svg>`,
      };
      const DISPLAY_MODES = [
        { mode: "solid", label: "Solid" },
        { mode: "wireframe", label: "Wireframe" },
        { mode: "solid+wireframe", label: "Solid + wireframe" },
      ];
      // Layer-3 pigmentation pattern regimes (index → label), matching PigRegime
      // in crates/shell-core. A reaction–diffusion engine generates the pattern
      // as the shell grows — there is no manual colour picking any more.
      const REGIMES = [
        "Solid", "Spiral bands", "Axial stripes", "Oblique lines",
        "Chevrons / tented", "Spots", "Reticulated",
      ];
      // Layer-4 palette: the three colours the pigment field is mapped through
      // (0 = ground, mid = accent, 1 = pattern). Recolouring is a cheap re-bake.
      const PALETTE = [
        { key: "base",    label: "Ground",  value: "#efe3c8" },
        { key: "accent",  label: "Accent",  value: "#b9793f" },
        { key: "pattern", label: "Pattern", value: "#6f3d1d" },
      ];
      // Initial pigmentation values shown on first load (kept in step with the
      // viewer's DEFAULTS); pushed to the viewer in the init block below.
      const DEMO_PIG = {
        pig_regime: 1, pig_scale: 0.5, pig_contrast: 0.6,
        pig_density: 0.5, pig_angle: 0.5, pig_irregularity: 0.15,
      };
      // Fallback pigment ranges (mirror PIGMENT_RANGES in shell-core), used only
      // if pigment_ranges() is unavailable. Replaced from Rust in initRanges().
      const FALLBACK_PIGMENT = [
        { key: "pig_regime",       label: "Pattern",       min: 0, max: 6, step: 1,    default: 0,   integer: true },
        { key: "pig_scale",        label: "Feature scale", min: 0, max: 1, step: 0.01, default: 0.5, integer: false },
        { key: "pig_contrast",     label: "Contrast",      min: 0, max: 1, step: 0.01, default: 0.5, integer: false },
        { key: "pig_density",      label: "Density",       min: 0, max: 1, step: 0.01, default: 0.5, integer: false },
        { key: "pig_angle",        label: "Obliqueness",   min: 0, max: 1, step: 0.01, default: 0.0, integer: false },
        { key: "pig_irregularity", label: "Irregularity",  min: 0, max: 1, step: 0.01, default: 0.0, integer: false },
      ];
      let PIGMENT = FALLBACK_PIGMENT; // replaced with the Rust table in initRanges()

      // Fallback ranges, used ONLY if param_ranges() is unavailable (offline /
      // wasm load failure) so the panel still renders. The authoritative source
      // is PARAM_RANGES in crates/shell-core.
      const FALLBACK_RANGES = [
        { key: "w",      min: 1.05, max: 8.0,  step: 0.01, default: 2.0,  integer: false },
        { key: "d",      min: 0.0,  max: 0.95, step: 0.01, default: 0.15, integer: false },
        { key: "t",      min: 0.0,  max: 12.0, step: 0.01, default: 1.5,  integer: false },
        { key: "n",      min: 0.5,  max: 20.0, step: 0.1,  default: 5.0,  integer: false },
        { key: "aspect", min: 0.3,  max: 4.0,  step: 0.01, default: 1.0,  integer: false },
        { key: "rib_ax_count", min: 0, max: 40, step: 1,    default: 0, integer: true },
        { key: "rib_ax_amp",   min: 0, max: 0.6, step: 0.01, default: 0, integer: false },
        { key: "rib_sp_count", min: 0, max: 60, step: 1,    default: 0, integer: true },
        { key: "rib_sp_amp",   min: 0, max: 0.6, step: 0.01, default: 0, integer: false },
        { key: "rib_sharp",    min: 0, max: 1,  step: 0.01, default: 0, integer: false },
        { key: "proj_count",   min: 0, max: 30, step: 1,    default: 0, integer: true },
        { key: "proj_rows",    min: 0, max: 5,  step: 1,    default: 0, integer: true },
        { key: "proj_pos",     min: 0, max: 6.2832, step: 0.01, default: 0, integer: false },
        { key: "proj_size",    min: 0, max: 1.2, step: 0.01, default: 0, integer: false },
        { key: "proj_sharp",   min: 0, max: 1,  step: 0.01, default: 0, integer: false },
        { key: "varix_count",  min: 0, max: 6,  step: 1,    default: 0, integer: true },
        { key: "varix_amp",    min: 0, max: 0.5, step: 0.01, default: 0, integer: false },
        { key: "seed",         min: 0, max: 9999, step: 1,  default: 0, integer: true },
        { key: "jitter",       min: 0, max: 1,  step: 0.01, default: 0, integer: false },
      ];

      // Populated from the range table in initRanges() (fallback values here).
      let FIELDS = FALLBACK_RANGES.map((r) => r.key);
      let INTS = new Set(FALLBACK_RANGES.filter((r) => r.integer).map((r) => r.key));

      // ---- Markup builders -------------------------------------------------
      const stepStr = (s) => Number(s.toPrecision(4)); // avoid f32 round-trip noise
      const hintSpan = (h) => (h ? ` <span class="hint" title="${h}">ⓘ</span>` : "");

      function rangeRow(key, r) {
        const m = LABELS[key] || { label: key };
        return `<label>${m.label}${hintSpan(m.hint)}<div class="row">
          <input name="${key}" type="range" min="${r.min}" max="${r.max}" step="${stepStr(r.step)}" value="${r.default}" />
          <output id="val-${key}"></output></div></label>`;
      }

      // Build the Pigmentation panel (left column, lower half): the pattern-regime
      // selector, the reaction–diffusion sliders, and the Layer-4 palette.
      function buildPigmentation() {
        // Reaction–diffusion sliders, configured from the Rust pigment range
        // table; the regime is a selector (it changes the RD configuration).
        const pigSliders = PIGMENT.filter((r) => r.key !== "pig_regime").map((r) =>
          `<label>${r.label}<div class="row">
            <input id="pig-${r.key}" type="range" min="${r.min}" max="${r.max}" step="${stepStr(r.step)}" value="${DEMO_PIG[r.key] ?? r.default}" />
            <output id="val-${r.key}"></output></div></label>`).join("");
        const regimeSel = `<select id="pig-regime">${REGIMES.map((name, i) =>
          `<option value="${i}"${i === DEMO_PIG.pig_regime ? " selected" : ""}>${name}</option>`).join("")}</select>`;
        const paletteRow = `<div class="palette">${PALETTE.map((c) =>
          `<label>${c.label}<input id="pal-${c.key}" type="color" value="${c.value}" title="${c.label}" /></label>`).join("")}</div>`;
        pigmentation.innerHTML = `
          <div class="field-label first">Pattern</div>
          ${regimeSel}
          ${pigSliders}
          <div class="field-label">Palette</div>
          ${paletteRow}`;
      }

      // Build the Appearance panel (right column, lower half): display-mode icons,
      // the material finish sliders, and photo render.
      function buildAppearance() {
        const sliders = MATERIAL.map((m) =>
          `<label>${m.label}${hintSpan(m.hint)}<div class="row">
            <input id="mat-${m.key}" type="range" min="${m.min}" max="${m.max}" step="${m.step}" value="${m.value}" />
            <output id="val-${m.key}"></output></div></label>`).join("");
        appearance.innerHTML = `
          <div class="field-label first">Display mode</div>
          <div class="mode-group" id="rendermode">
            ${DISPLAY_MODES.map((d, i) =>
              `<button type="button" class="mode-btn${i === 0 ? " active" : ""}" data-mode="${d.mode}" title="${d.label}" aria-label="${d.label}">${ICON[d.mode]}</button>`).join("")}
          </div>
          <div class="subhead">Material finish</div>
          ${sliders}
          <div class="subhead">Photo render</div>
          <button type="button" id="render" class="dice">▶ Render (path trace)</button>
          <button type="button" id="savepng" class="dice">⬇ Save PNG</button>
          <div id="rstatus" class="rstatus"></div>`;
      }

      // Build the whole control panel from GROUPS + the range table, then the
      // Appearance group (render mode + material + photo render).
      function buildControls(rangeMap) {
        let html = "";
        for (const g of GROUPS) {
          html += `<details${g.open ? " open" : ""}><summary>${g.title}</summary>`;
          if (g.params) {
            html += g.params.map((k) => rangeRow(k, rangeMap[k])).join("");
          }
          for (const sg of g.subgroups || []) {
            html += `<details class="sub"${sg.open === false ? "" : " open"}><summary>${sg.title}</summary>`;
            html += sg.params.map((k) => rangeRow(k, rangeMap[k])).join("");
            if (sg.dice) html += `<button type="button" id="dice" class="dice">🎲 Random seed</button>`;
            html += `</details>`;
          }
          html += `</details>`;
        }
        form.innerHTML = html; // Shape + Ornamentation only; Appearance is built
        // separately into the right column (see buildAppearance).
      }

      // ---- Value plumbing --------------------------------------------------
      const readForm = () =>
        Object.fromEntries(FIELDS.map((f) => [f, parseFloat(form.elements[f].value)]));

      let timer;
      function update() {
        for (const f of FIELDS) {
          const out = document.getElementById("val-" + f);
          if (out) {
            const v = parseFloat(form.elements[f].value);
            out.textContent = INTS.has(f) ? String(v) : v.toFixed(2);
          }
        }
        clearTimeout(timer);
        timer = setTimeout(() => viewer.setParams(readForm()), 30);
      }

      // Material finish updates the look without regenerating geometry.
      function updateMaterial() {
        const patch = {};
        for (const f of MAT_RANGES) {
          const el = document.getElementById("mat-" + f);
          if (!el) continue;
          const v = parseFloat(el.value);
          patch[f] = v;
          const out = document.getElementById("val-" + f);
          if (out) out.textContent = v.toFixed(2);
        }
        viewer.setMaterial(patch);
      }

      // Pigmentation pattern (regime + reaction–diffusion knobs) → a geometry
      // rebuild that re-runs the RD sim. The palette is look-only (cheap re-bake).
      function updatePigment() {
        const patch = { pig_regime: parseInt(document.getElementById("pig-regime").value, 10) };
        for (const r of PIGMENT) {
          if (r.key === "pig_regime") continue;
          const el = document.getElementById("pig-" + r.key);
          if (!el) continue;
          const v = parseFloat(el.value);
          patch[r.key] = v;
          const out = document.getElementById("val-" + r.key);
          if (out) out.textContent = v.toFixed(2);
        }
        viewer.setParams(patch);
      }
      function updatePalette() {
        const patch = {};
        for (const c of PALETTE) patch[c.key] = document.getElementById("pal-" + c.key).value;
        viewer.setPalette(patch);
      }

      // Display mode (icon buttons).
      function setMode(mode) {
        for (const b of document.querySelectorAll(".mode-btn"))
          b.classList.toggle("active", b.dataset.mode === mode);
        viewer.setRenderMode(mode);
      }

      // ---- Species browser -------------------------------------------------
      // Real molluscs the generator reproduces well — validated against reference
      // photos in the harness (the 12 "good" + the excellent "silhouette" auger;
      // species the swept-tube model can't form, e.g. cones/cowries/spider conchs,
      // are excluded). Params come straight from harness/species.json. Clicking one
      // loads its shape; thumbnails are rendered from the actual WASM geometry.
      // Some species also carry a characteristic pigmentation: `pig` (Layer-3 RD
      // params, see DEMO_PIG/PIGMENT keys) and `palette` (Layer-4 base/accent/
      // pattern). Species without them fall back to the current defaults.
      const SPECIES = [
        { sci: "Nautilus pompilius", common: "Chambered nautilus",
          params: { w: 3.0, d: 0.1, t: 0.0, n: 4.0, aspect: 1.0 },
          // Radial brown "flame" stripes running across the whorl.
          pig: { pig_regime: 2, pig_scale: 0.45, pig_contrast: 0.7, pig_density: 0.6, pig_angle: 0.0, pig_irregularity: 0.25 },
          palette: { base: "#f4ead2", accent: "#c8763f", pattern: "#9c3f1e" } },
        { sci: "Planorbis planorbis", common: "Ramshorn snail",
          params: { w: 1.8, d: 0.25, t: 0.0, n: 4.0, aspect: 0.9 },
          // Plain horn-brown.
          pig: { pig_regime: 0 },
          palette: { base: "#7a5230", accent: "#5e3d22", pattern: "#3f2814" } },
        { sci: "Spirula spirula", common: "Ram's horn squid shell",
          params: { w: 1.8, d: 0.7, t: 0.0, n: 4.0, aspect: 1.0 },
          // Chalky white internal shell — no pigment pattern.
          pig: { pig_regime: 0 },
          palette: { base: "#f3efe4", accent: "#e4dccb", pattern: "#cdc4ad" } },
        { sci: "Architectonica perspectiva", common: "Clear sundial",
          params: { w: 1.6, d: 0.55, t: 0.85, n: 6.0, aspect: 1.0, rib_sp_count: 8, rib_sp_amp: 0.05 },
          // Concentric spiral rows of brown dashes.
          pig: { pig_regime: 1, pig_scale: 0.35, pig_contrast: 0.8, pig_density: 0.5, pig_angle: 0.0, pig_irregularity: 0.1 },
          palette: { base: "#dac49a", accent: "#9a6a38", pattern: "#5a3415" } },
        { sci: "Helix pomatia", common: "Roman / Burgundy snail",
          params: { w: 2.6, d: 0.18, t: 1.2, n: 4.5, aspect: 0.7 },
          // Faint, soft spiral colour bands.
          pig: { pig_regime: 1, pig_scale: 0.6, pig_contrast: 0.35, pig_density: 0.25, pig_angle: 0.0, pig_irregularity: 0.2 },
          palette: { base: "#d8b98a", accent: "#a87b4e", pattern: "#7a542f" } },
        { sci: "Cepaea nemoralis", common: "Grove / banded snail",
          params: { w: 2.4, d: 0.15, t: 1.0, n: 4.5, aspect: 0.7 },
          // The classic dark spiral bands on a yellow ground.
          pig: { pig_regime: 1, pig_scale: 0.55, pig_contrast: 0.85, pig_density: 0.3, pig_angle: 0.0, pig_irregularity: 0.05 },
          palette: { base: "#e7c64a", accent: "#9c6b2a", pattern: "#3f2611" } },
        { sci: "Littorina littorea", common: "Common periwinkle",
          params: { w: 2.0, d: 0.1, t: 2.3, n: 5.5, aspect: 0.85 },
          // Fine grey-brown spiral lines.
          pig: { pig_regime: 1, pig_scale: 0.2, pig_contrast: 0.6, pig_density: 0.3, pig_angle: 0.0, pig_irregularity: 0.15 },
          palette: { base: "#9d8d74", accent: "#5f5142", pattern: "#332b22" } },
        { sci: "Tectus niloticus", common: "Commercial top shell",
          params: { w: 1.6, d: 0.05, t: 2.4, n: 7.0, aspect: 0.7, rib_sp_count: 8, rib_sp_amp: 0.05 },
          // Oblique reddish flame streaks down the spire.
          pig: { pig_regime: 3, pig_scale: 0.4, pig_contrast: 0.75, pig_density: 0.55, pig_angle: 0.6, pig_irregularity: 0.2 },
          palette: { base: "#eadfc8", accent: "#b65a3a", pattern: "#7e2f1c" } },
        { sci: "Turritella terebra", common: "Tower screw shell",
          params: { w: 1.35, d: 0.0, t: 6.0, n: 13.0, aspect: 0.6,
            rib_sp_count: 14, rib_sp_amp: 0.05, rib_sharp: 0.3 },
          // Fine reddish-brown spiral lines tracking the cords.
          pig: { pig_regime: 1, pig_scale: 0.18, pig_contrast: 0.65, pig_density: 0.3, pig_angle: 0.0, pig_irregularity: 0.15 },
          palette: { base: "#cdb38a", accent: "#9a6c40", pattern: "#6a3f20" } },
        { sci: "Cerithium nodulosum", common: "Giant knobbed cerith",
          params: { w: 1.6, d: 0.05, t: 3.5, n: 9.0, aspect: 0.7,
            proj_count: 12, proj_rows: 2, proj_pos: 0.6, proj_size: 0.14, proj_sharp: 0.25 },
          // Pale spiral bands on a dark ground (inverted palette).
          pig: { pig_regime: 1, pig_scale: 0.35, pig_contrast: 0.75, pig_density: 0.4, pig_angle: 0.0, pig_irregularity: 0.2 },
          palette: { base: "#3a2c1c", accent: "#8a6e48", pattern: "#e8dcc0" } },
        { sci: "Cancellaria reticulata", common: "Common nutmeg",
          params: { w: 1.9, d: 0.12, t: 2.8, n: 6.0, aspect: 0.8,
            rib_ax_count: 14, rib_ax_amp: 0.07, rib_sp_count: 11, rib_sp_amp: 0.05, rib_sharp: 0.35 },
          // Reticulate (net) pigmentation — true to the name.
          pig: { pig_regime: 6, pig_scale: 0.5, pig_contrast: 0.7, pig_density: 0.55, pig_angle: 0.0, pig_irregularity: 0.2 },
          palette: { base: "#e6cda2", accent: "#b07a3f", pattern: "#7c3f1a" } },
        { sci: "Bursa bufonia", common: "Toad frog shell",
          params: { w: 2.0, d: 0.12, t: 2.3, n: 6.0, aspect: 0.8, varix_count: 3, varix_amp: 0.28 },
          // Mottled blotchy brown.
          pig: { pig_regime: 6, pig_scale: 0.65, pig_contrast: 0.55, pig_density: 0.45, pig_angle: 0.0, pig_irregularity: 0.5 },
          palette: { base: "#d6c09a", accent: "#9a6a40", pattern: "#5c3a1f" } },
        { sci: "Terebra maculata", common: "Marlin-spike auger",
          params: { w: 1.4, d: 0.0, t: 11.0, n: 18.0, aspect: 0.7, rib_ax_count: 18, rib_ax_amp: 0.05 },
          // Spiral rows of squarish orange-brown spots ("maculata" = spotted).
          pig: { pig_regime: 5, pig_scale: 0.5, pig_contrast: 0.8, pig_density: 0.6, pig_angle: 0.0, pig_irregularity: 0.2 },
          palette: { base: "#f0e7d2", accent: "#caa05a", pattern: "#9c5a24" } },
      ];

      const speciesList = document.getElementById("species-list");
      speciesList.innerHTML = SPECIES.map((s, i) => `
        <li class="species-item" data-i="${i}">
          <img class="species-thumb" alt="${s.sci}" />
          <span class="species-name">
            <span class="species-sci">${s.sci}</span>
            <span class="species-common">${s.common}</span>
          </span>
        </li>`).join("");

      // Resolve a species' pigmentation/palette, filling unset values from the
      // demo defaults / default swatches. Shared by the panel and the thumbnails.
      const speciesPig = (s) => ({ ...DEMO_PIG, ...(s.pig || {}) });
      const paletteDefaults = Object.fromEntries(PALETTE.map((c) => [c.key, c.value]));
      const speciesPalette = (s) => ({ ...paletteDefaults, ...(s.palette || {}) });

      function applySpecies(i) {
        const s = SPECIES[i];
        if (!s) return;
        // Shape.
        for (const f of FIELDS) form.elements[f].value = s.params[f] ?? 0; // unset → 0
        // Pigmentation (Layer 3): species value → current demo default fallback.
        const pig = speciesPig(s);
        document.getElementById("pig-regime").value = pig.pig_regime;
        for (const r of PIGMENT) {
          if (r.key === "pig_regime") continue;
          const el = document.getElementById("pig-" + r.key);
          if (el) el.value = pig[r.key] ?? r.default;
        }
        // Palette (Layer 4): species value → default swatch fallback.
        const palette = speciesPalette(s);
        for (const c of PALETTE) {
          const el = document.getElementById("pal-" + c.key);
          if (el) el.value = palette[c.key];
        }
        update();        // shape → geometry
        updatePigment(); // regime + RD sliders → pattern
        updatePalette(); // palette → recolour
        for (const el of speciesList.children) el.classList.toggle("active", +el.dataset.i === i);
      }
      speciesList.addEventListener("click", (e) => {
        const li = e.target.closest(".species-item");
        if (li) applySpecies(+li.dataset.i);
      });

      // Render each species' actual geometry + pigmentation to a thumbnail once
      // the wasm is ready (shape params merged with the species' RD pigment).
      async function loadThumbnails() {
        let urls;
        try {
          const entries = SPECIES.map((s) => ({
            params: { ...s.params, ...speciesPig(s) },
            palette: speciesPalette(s),
          }));
          urls = await viewer.makeThumbnails(entries, 128);
        } catch (e) {
          console.warn("thumbnails unavailable", e);
          return;
        }
        const imgs = speciesList.querySelectorAll(".species-thumb");
        urls.forEach((u, i) => { if (u && imgs[i]) imgs[i].src = u; });
      }

      // ---- Event wiring (after the controls exist) -------------------------
      function wireEvents() {
        form.addEventListener("input", update); // form holds only shape params now

        // Appearance: display-mode icons, pigmentation (regime + RD sliders +
        // palette), and material-finish sliders.
        document.getElementById("rendermode").addEventListener("click", (e) => {
          const b = e.target.closest(".mode-btn");
          if (b) setMode(b.dataset.mode);
        });
        document.getElementById("pig-regime").addEventListener("change", updatePigment);
        for (const r of PIGMENT) {
          if (r.key === "pig_regime") continue;
          document.getElementById("pig-" + r.key).addEventListener("input", updatePigment);
        }
        for (const c of PALETTE)
          document.getElementById("pal-" + c.key).addEventListener("input", updatePalette);
        for (const f of MAT_RANGES)
          document.getElementById("mat-" + f).addEventListener("input", updateMaterial);

        document.getElementById("dice").addEventListener("click", () => {
          form.elements["seed"].value = Math.floor(Math.random() * 10000);
          update();
        });

        // Path-traced "Render" mode.
        const renderBtn = document.getElementById("render");
        const rstatus = document.getElementById("rstatus");
        let rendering = false;
        renderBtn.addEventListener("click", async () => {
          if (rendering) {
            viewer.stopHQ();
            rendering = false;
            renderBtn.textContent = "▶ Render (path trace)";
            rstatus.textContent = "";
            return;
          }
          rstatus.textContent = "starting path tracer…";
          const ok = await viewer.renderHQ();
          if (!ok) { rstatus.textContent = "path tracer unavailable (see console)"; return; }
          rendering = true;
          renderBtn.textContent = "■ Stop";
        });
        viewer.addEventListener("hq-progress", (e) => {
          if (rendering) rstatus.textContent = `path-tracing… ${e.detail.samples} samples (drag to re-aim)`;
        });
        document.getElementById("savepng").addEventListener("click", () => viewer.saveImage("shell.png"));
      }

      // Pull the authoritative ranges from Rust (via wasm), build the panel from
      // them, then push the initial values. Falls back to FALLBACK_RANGES on error.
      async function initRanges() {
        let ranges;
        try {
          ranges = await viewer.paramRanges();
        } catch (e) {
          console.warn("param_ranges() unavailable; using fallback ranges", e);
          ranges = FALLBACK_RANGES;
        }
        FIELDS = ranges.map((r) => r.key);
        INTS = new Set(ranges.filter((r) => r.integer).map((r) => r.key));
        const rangeMap = Object.fromEntries(ranges.map((r) => [r.key, r]));
        buildControls(rangeMap);

        // Layer-3 pigmentation ranges (separate Rust table → Appearance panel).
        try {
          PIGMENT = await viewer.pigmentRanges();
        } catch (e) {
          console.warn("pigment_ranges() unavailable; using fallback ranges", e);
          PIGMENT = FALLBACK_PIGMENT;
        }
      }

      initRanges().then(() => {
        buildPigmentation(); // build the left-column (bottom) pigmentation controls
        buildAppearance();   // build the right-column appearance controls
        wireEvents();
        update();          // push initial geometry values
        updatePigment();   // push initial pigmentation pattern (RD)
        updatePalette();   // push initial palette
        updateMaterial();  // push initial material finish
        setMode("solid");  // default display mode
        loadThumbnails();  // fill the species browser with rendered thumbnails
      });
    </script>
  </body>
</html>
